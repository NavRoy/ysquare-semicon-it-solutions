<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    overflow:hidden;
}

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:.25;
}

body::before{
    width:350px;
    height:350px;
    background:#00d4ff;
    top:-120px;
    left:-100px;
}

body::after{
    width:400px;
    height:400px;
    background:#38bdf8;
    bottom:-150px;
    right:-120px;
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:700px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:24px;
    padding:60px 40px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

h1{
    color:#fff;
    font-size:48px;
    margin-bottom:15px;
}

h3{
    color:#8fd3ff;
    font-weight:500;
    margin-bottom:25px;
}

p{
    color:#dbeafe;
    line-height:1.8;
    font-size:17px;
    margin-bottom:35px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#fff;
    color:#1e3a8a;
    padding:15px 35px;
    border-radius:50px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 30px rgba(255,255,255,.25);
}

@media(max-width:768px){

.card{
    padding:40px 25px;
}

h1{
    font-size:36px;
}

h3{
    font-size:20px;
}

p{
    font-size:15px;
}

}
</style>

</head>

<body>

<div class="card">

<div class="icon">🚀</div>

<h1>Coming Soon</h1>

<h3>We're Working on Something Amazing</h3>

<p>
This page is currently under development as we work to deliver an exceptional experience.
We're adding exciting content, enhanced features, and valuable information.
Please check back soon to see what's new.
</p>

<a href="index.html" class="btn">← Back to Home</a>

</div>

</body>
</html>
